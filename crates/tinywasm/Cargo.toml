name="test-wasm-2"
harness=false

[[test]]
name="test-wasm-3"
harness=false

[[test]]
name="test-wasm-multi-memory"
harness=false

[[test]]
name="test-wasm-annotations"
harness=false

[[test]]
name="test-wasm-custom-page-sizes"
harness=false

[[test]]
name="test-wasm-tail-call"
harness=false

[[test]]
name="test-wasm-memory64"
harness=false
test=false

[[test]]
name="test-wasm-extended-const"
harness=false
test=false

[[test]]
name="test-wasm-relaxed-simd"
harness=false
test=false

[[test]]
name="test-wasm-simd"
harness=false
test=false

[[test]]
name="test-wast"
harness=false
test=false

[[bench]]
name="argon2id"
harness=false

[[bench]]
name="fibonacci"
harness=false

[[bench]]
name="tinywasm"
harness=false
