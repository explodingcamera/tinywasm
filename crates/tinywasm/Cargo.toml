[package]
name="tinywasm"
version.workspace=true
description="A tiny WebAssembly interpreter"
edition.workspace=true
license.workspace=true
authors.workspace=true
repository.workspace=true
rust-version.workspace=true
keywords.workspace=true
categories.workspace=true
readme="../../README.md"

[lib]
name="tinywasm"
path="src/lib.rs"

[dependencies]
log={workspace=true, optional=true}
tinywasm-parser={version="0.9.0-alpha.0", path="../parser", default-features=false, optional=true}
tinywasm-types={version="0.9.0-alpha.0", path="../types", default-features=false}
libm={version="0.2", default-features=false}

[dev-dependencies]
wasm-testsuite.workspace=true
indexmap.workspace=true
wast.workspace=true
wat.workspace=true
eyre.workspace=true
pretty_env_logger.workspace=true
criterion.workspace=true
owo-colors.workspace=true
serde_json.workspace=true
serde.workspace=true

[features]
default=["std", "parser", "logging", "archive", "canonicalize_nans", "unstable-simd"]

logging=["log", "tinywasm-parser?/logging", "tinywasm-types/logging"]
std=["tinywasm-parser?/std", "tinywasm-types/std"]

# support for parsing WebAssembly
parser=["dep:tinywasm-parser"]

# support for "archiving" tinywasm bytecode
archive=["tinywasm-types/archive"]

# canonicalize all NaN values to a single representation
canonicalize_nans=[]

# enable simd support (unstable / unfinished)
unstable-simd=[]

[[test]]
name="test-wasm-1"
harness=false

